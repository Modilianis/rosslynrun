<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hotelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Заден фон -->
  <rect width="200" height="200" rx="30" fill="url(#hotelGrad)"/>
  
  <!-- Златна рамка -->
  <rect x="5" y="5" width="190" height="190" rx="25" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- Хотел икона -->
  <rect x="60" y="80" width="80" height="70" rx="3" fill="white" opacity="0.9"/>
  <rect x="60" y="80" width="80" height="15" fill="url(#goldGrad)"/>
  <rect x="85" y="95" width="30" height="25" rx="2" fill="#1a237e"/>
  <rect x="85" y="120" width="30" height="30" fill="#1a237e"/>
  <rect x="65" y="120" width="15" height="30" fill="#1a237e"/>
  <rect x="120" y="120" width="15" height="30" fill="#1a237e"/>
  
  <!-- Прозорци -->
  <rect x="70" y="100" width="8" height="8" rx="1" fill="url(#goldGrad)"/>
  <rect x="82" y="100" width="8" height="8" rx="1" fill="url(#goldGrad)"/>
  <rect x="110" y="100" width="8" height="8" rx="1" fill="url(#goldGrad)"/>
  <rect x="122" y="100" width="8" height="8" rx="1" fill="url(#goldGrad)"/>
  
  <!-- Rosslyn текст -->
  <text x="100" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="url(#goldGrad)">ROSSLYN</text>
  <text x="100" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">CENTRAL PARK HOTEL</text>
  
  <!-- Златна звезда -->
  <polygon points="100,168 103,176 112,176 105,181 108,190 100,185 92,190 95,181 88,176 97,176" fill="url(#goldGrad)"/>
</svg>
